<!DOCTYPE html>

<html><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<title>Telegaforce</title>
<meta name="theme-color" content="#0a0a0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Telegaforce"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><radialGradient id='g' cx='50%25' cy='50%25' r='50%25'><stop offset='30%25' stop-color='%23222'/><stop offset='60%25' stop-color='%237b6cf6'/><stop offset='75%25' stop-color='%2360d8f7'/><stop offset='90%25' stop-color='%2300e5a0'/><stop offset='100%25' stop-color='%23ff8a3d'/></radialGradient></defs><circle cx='50' cy='50' r='48' fill='url(%23g)'/></svg>"/>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><radialGradient id='g' cx='50%25' cy='50%25' r='50%25'><stop offset='30%25' stop-color='%23222'/><stop offset='60%25' stop-color='%237b6cf6'/><stop offset='75%25' stop-color='%2360d8f7'/><stop offset='90%25' stop-color='%2300e5a0'/><stop offset='100%25' stop-color='%23ff8a3d'/></radialGradient></defs><rect width='100' height='100' rx='22' fill='%230a0a0d'/><circle cx='50' cy='50' r='40' fill='url(%23g)'/></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{-webkit-user-select:none;user-select:none;font-family:'Inter',sans-serif;font-size:14px;background:#0a0a0d;color:#f2f2f7;-webkit-tap-highlight-color:transparent}
input,textarea{-webkit-user-select:text;user-select:text}
:root{
  --bg:#0a0a0d;--s1:#15151a;--s2:#1d1d24;--s3:#26262e;--bd:#2e2e3a;
  --acc:#3b82f6;--acc2:rgba(59,130,246,.16);--accg:rgba(59,130,246,.32);
  --t1:#f2f2f7;--t2:#8e8ea0;--t3:#5a5a6e;--red:#ff453a;
  --mebub:#0e1d3a;--mebrd:rgba(59,130,246,.22);--thembub:#1f1f2a;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
  --ease:cubic-bezier(.32,.72,0,1);--bounce:cubic-bezier(.16,1.2,.4,1);
}
html,body{height:100%;overflow:hidden}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes msgPop{from{opacity:0;transform:scale(.85) translateY(15px)}60%{opacity:1;transform:scale(1.02) translateY(-2px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
@keyframes menuPop{from{opacity:0;transform:scale(.85) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes wiggle{0%,100%{transform:translateX(0) scale(1)}15%{transform:translateX(-3px) scale(1.1)}30%{transform:translateX(3px) scale(1.1)}45%{transform:translateX(-2px) scale(1.05)}60%{transform:translateX(2px) scale(1.05)}80%{transform:translateX(-1px) scale(1.02)}}
@keyframes glow{0%,100%{box-shadow:0 4px 14px var(–accg)}50%{box-shadow:0 4px 22px var(–accg),0 0 0 4px var(–acc2)}}

.gone{display:none!important}
.screen{position:fixed;inset:0;display:flex;flex-direction:column}

#s-auth{background:radial-gradient(ellipse at top,rgba(59,130,246,.08),transparent 55%),radial-gradient(ellipse at bottom,rgba(139,92,246,.06),transparent 55%),var(–bg);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1.5rem 1.5rem calc(var(–sb) + 3rem);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:100%}
.acard{width:100%;max-width:400px;background:linear-gradient(180deg,rgba(28,28,38,.92),rgba(20,20,28,.88));border:1px solid rgba(255,255,255,.06);border-radius:28px;padding:2.2rem 1.8rem 1.6rem;position:relative;overflow:hidden;animation:fadeUp .55s var(–ease) both;margin:auto 0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 30px 70px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.02) inset;flex-shrink:0}
.acard>*{position:relative;z-index:1}
.acard::before{content:’’;position:absolute;top:-1px;left:18%;right:18%;height:2px;background:linear-gradient(90deg,transparent,var(–acc),#8b5cf6,var(–acc),transparent);border-radius:2px;filter:blur(.5px);z-index:1}
.acard::after{content:’’;position:absolute;top:-100px;right:-80px;width:200px;height:200px;background:radial-gradient(circle,var(–acc2),transparent 70%);pointer-events:none;opacity:.6;z-index:0}
.alogo{font-family:‘IBM Plex Mono’,monospace;font-size:1.85rem;background:linear-gradient(135deg,var(–acc),#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.03em;margin-bottom:.3rem;font-weight:600;position:relative}
.asub{font-size:.78rem;color:var(–t2);margin-bottom:1.7rem;letter-spacing:.02em;position:relative}
.atabs{position:relative;display:grid;grid-template-columns:1fr 1fr;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:4px;margin-bottom:1.5rem}
.atab-pill{position:absolute;top:4px;bottom:4px;width:calc(50% - 4px);background:linear-gradient(180deg,var(–s3),var(–s2));border-radius:11px;box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06) inset;transition:transform .55s cubic-bezier(.34,1.7,.4,1);left:4px;z-index:0}
.atabs.r .atab-pill{transform:translateX(100%)}
.aforms{position:relative;overflow:hidden}
.aform{transition:transform .5s cubic-bezier(.34,1.4,.5,1),opacity .35s var(–ease)}
.aform.hide-l{transform:translateX(-40px);opacity:0;position:absolute;inset:0;pointer-events:none}
.aform.hide-r{transform:translateX(40px);opacity:0;position:absolute;inset:0;pointer-events:none}
.atab{padding:.62rem;border:none;background:transparent;border-radius:11px;font-family:inherit;font-size:.84rem;font-weight:600;color:var(–t2);cursor:pointer;transition:color .3s;position:relative;z-index:1;letter-spacing:.01em}
.atab.on{color:var(–t1)}
.fld{margin-bottom:.85rem}
.flbl{display:block;font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(–t2);margin-bottom:.38rem}
.uwrap{display:flex;align-items:center;background:rgba(0,0,0,.2);border:1.5px solid rgba(255,255,255,.05);border-radius:13px;overflow:hidden;transition:all .25s}
.uwrap:focus-within{border-color:var(–acc);box-shadow:0 0 0 4px var(–acc2),0 4px 14px rgba(0,0,0,.3)}
.atsign{padding:.78rem 0 .78rem 1rem;color:var(–acc);font-family:‘IBM Plex Mono’,monospace;font-size:.95rem;font-weight:600;user-select:none;pointer-events:none;flex-shrink:0;line-height:1}
.uinput{flex:1;padding:.78rem 1rem .78rem .22rem;background:transparent;border:none;color:var(–t1);font-family:‘IBM Plex Mono’,monospace;font-size:.88rem;outline:none;min-width:0;-webkit-appearance:none}
.finput{width:100%;padding:.78rem 1rem;background:rgba(0,0,0,.2);border:1.5px solid rgba(255,255,255,.05);border-radius:13px;color:var(–t1);font-family:inherit;font-size:.88rem;outline:none;transition:all .25s;-webkit-appearance:none}
.finput:focus{border-color:var(–acc);box-shadow:0 0 0 4px var(–acc2),0 4px 14px rgba(0,0,0,.3)}
.fname-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.avu-wrap{display:flex;flex-direction:column;align-items:center;gap:.55rem;margin-bottom:1.1rem}
.avu{position:relative;width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(–s2),var(–s3));border:2px dashed rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:all .3s var(–ease);box-shadow:inset 0 2px 8px rgba(0,0,0,.4)}
.avu:hover{border-color:var(–acc);border-style:solid;transform:scale(1.06);box-shadow:inset 0 2px 8px rgba(0,0,0,.4),0 6px 20px var(–accg)}
.avu img{width:100%;height:100%;object-fit:cover}
.avu-icon svg{width:32px;height:32px;fill:none;stroke:var(–t3);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.avu-edit{position:absolute;bottom:0;right:0;width:28px;height:28px;background:linear-gradient(135deg,var(–acc),#6366f1);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;border:2.5px solid var(–s1);box-shadow:0 2px 8px var(–accg)}
.avu-hint{font-size:.72rem;color:var(–t2);letter-spacing:.02em}
.abtn{width:100%;padding:.92rem;margin-top:.5rem;background:linear-gradient(135deg,var(–acc),#6366f1);color:#fff;border:none;border-radius:14px;font-family:‘IBM Plex Mono’,monospace;font-size:.85rem;font-weight:600;letter-spacing:.08em;cursor:pointer;transition:all .25s;box-shadow:0 6px 18px rgba(59,130,246,.35),0 0 0 1px rgba(255,255,255,.08) inset;position:relative;overflow:hidden}
.abtn:hover{filter:brightness(1.12);box-shadow:0 10px 28px rgba(59,130,246,.5),0 0 0 1px rgba(255,255,255,.1) inset;transform:translateY(-1px)}
.abtn:active{transform:translateY(0) scale(.98)}
.aerr{margin-top:.75rem;padding:.7rem 1rem;background:linear-gradient(180deg,rgba(255,69,58,.14),rgba(255,69,58,.08));border:1px solid rgba(255,69,58,.25);border-radius:12px;color:var(–red);font-size:.78rem;display:none;text-align:center;font-weight:500;box-shadow:0 4px 14px rgba(255,69,58,.15)}
.aerr.show{display:block;animation:errIn .4s cubic-bezier(.34,1.5,.4,1)}
@keyframes errIn{from{opacity:0;transform:translateY(-8px) scale(.95)}60%{opacity:1;transform:translateY(2px) scale(1.02)}to{opacity:1;transform:translateY(0) scale(1)}}

#s-app{background:var(–bg);z-index:100;opacity:0;transition:opacity .4s var(–ease)}
#s-app.visible{opacity:1}
.topbar{display:flex;align-items:center;gap:.5rem;padding:calc(var(–st) + .8rem) 1rem .65rem;background:rgba(15,15,20,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:.5px solid var(–bd);flex-shrink:0;z-index:10}
.topbar-title{font-size:1.15rem;font-weight:700;flex:1;letter-spacing:-.02em;transition:opacity .2s}
.icon-btn{width:34px;height:34px;border-radius:10px;background:none;border:none;color:var(–t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn:hover{background:var(–s2);color:var(–t1)}
.icon-btn:active{transform:scale(.88)}
.icon-btn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.content{flex:1;overflow:hidden;position:relative;padding-bottom:calc(86px + var(–sb))}
.tp{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;transition:opacity .25s var(–ease),transform .35s cubic-bezier(.34,1.4,.6,1)}
.tp.hide-l{opacity:0;transform:translateX(-35px) scale(.97);pointer-events:none}
.tp.hide-r{opacity:0;transform:translateX(35px) scale(.97);pointer-events:none}

.bdock{position:fixed;left:0;right:0;bottom:calc(var(–sb) + 12px);display:flex;justify-content:center;align-items:center;gap:10px;padding:0 14px;z-index:50;animation:fadeUp .5s var(–ease) both;pointer-events:none}
.bcaps,.bsearch{pointer-events:auto;background:rgba(28,28,34,.78);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border:1px solid rgba(255,255,255,.06);box-shadow:0 12px 40px rgba(0,0,0,.6)}
.bcaps{position:relative;display:flex;align-items:center;border-radius:32px;padding:.5rem .55rem;gap:.25rem}
.bpill{position:absolute;top:.5rem;bottom:.5rem;background:var(–acc2);border-radius:24px;transition:left .5s cubic-bezier(.34,1.56,.5,1),width .5s cubic-bezier(.34,1.56,.5,1),opacity .25s;z-index:0;border:1px solid rgba(59,130,246,.3);opacity:0;box-shadow:0 2px 12px var(–accg),inset 0 1px 0 rgba(255,255,255,.08)}
.btab{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:62px;padding:.4rem .55rem;border:none;background:transparent;border-radius:24px;color:var(–t1);cursor:pointer;gap:.18rem;transition:transform .2s;-webkit-tap-highlight-color:transparent;position:relative;z-index:1}
.btab:active{transform:scale(.88)}
.btab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:all .4s cubic-bezier(.34,1.56,.5,1)}
.btab span{font-size:.66rem;font-weight:600;color:var(–t1);transition:color .35s}
.btab.on svg{stroke:var(–acc);filter:drop-shadow(0 0 8px var(–accg));transform:scale(1.12) translateY(-1px)}
.btab.on span{color:var(–acc)}
.bdot{position:absolute;top:5px;right:13px;width:8px;height:8px;border-radius:50%;background:var(–red);border:2px solid #1c1c22;display:none}
.bdot.show{display:block;animation:pop .3s ease}
.bsearch{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;color:var(–t1);cursor:pointer;transition:all .35s var(–ease);-webkit-tap-highlight-color:transparent;flex-shrink:0}
.bsearch:active{transform:scale(.9)}
.bsearch svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transform:scaleX(-1)}
.bsearch.on{background:var(–acc2);border-color:rgba(59,130,246,.3)}
.bsearch.on svg{stroke:var(–acc);filter:drop-shadow(0 0 6px var(–accg));animation:wiggle .55s var(–bounce)}

.sbar{padding:.65rem 1rem;border-bottom:.5px solid var(–bd);flex-shrink:0}
.sbar-inner{position:relative;display:flex;align-items:center}
.sbar-ico{position:absolute;left:.85rem;pointer-events:none;color:var(–t3)}
.sbar-ico svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;transform:scaleX(-1)}
.sinput{width:100%;padding:.55rem 2.5rem .55rem 2.25rem;background:var(–s2);border:1.5px solid var(–bd);border-radius:12px;color:var(–t1);font-family:inherit;font-size:.84rem;outline:none;transition:all .2s;-webkit-appearance:none}
.sinput:focus{border-color:var(–acc);box-shadow:0 0 0 3px var(–acc2)}
.sinput::placeholder{color:var(–t3)}
.sbar-add{position:absolute;right:.3rem;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:8px;background:var(–s3);border:none;color:var(–acc);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sbar-add:active{transform:translateY(-50%) scale(.9)}
.sbar-add svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round}

.slist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.slist::-webkit-scrollbar{width:0}
.sec-lbl{padding:.7rem 1rem .3rem;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(–t2)}

.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.66rem;font-weight:700;flex-shrink:0;overflow:hidden}
.av.md{width:42px;height:42px;font-size:.85rem}
.av.lg{width:60px;height:60px;font-size:1.15rem}
.av img{width:100%;height:100%;object-fit:cover}
.fav-av{background:linear-gradient(135deg,#3b82f6,#8b5cf6)!important;color:#fff!important}
.fav-av svg{width:55%;height:55%;fill:#fff;stroke:none}

.crow{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;cursor:pointer;transition:background .15s}
.crow:active{background:var(–s2)}
.crow.act{background:var(–acc2)}
.crow.pinned{background:linear-gradient(90deg,rgba(59,130,246,.06),transparent)}
.cravw{position:relative;flex-shrink:0}
.odot{position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;border:2.5px solid var(–bg)}
.crinfo{flex:1;min-width:0}
.crname{font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crprev{font-size:.74rem;color:var(–t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.12rem}
.crr{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0;position:relative}
.crow.pinned .crr::before{content:’’;position:absolute;top:-4px;right:-2px;width:14px;height:14px;background:no-repeat center/contain;background-image:url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6' stroke='%233b82f6' stroke-width='1.4' stroke-linejoin='round'><path d='M12 17v5M5 10.76V6l2-2h10l2 2v4.76l3 3.24H2z'/></svg>”);opacity:.85}
.crtime{font-size:.65rem;color:var(–t2)}
.bdg{background:var(–acc);color:#fff;font-size:.62rem;font-weight:700;border-radius:10px;padding:.1rem .47rem;min-width:18px;text-align:center;animation:pop .25s ease}
.pin-ico{color:var(–acc);font-size:.7rem;margin-left:.3rem}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem;text-align:center;gap:.7rem}
.empty-ico svg{width:64px;height:64px;fill:none;stroke:var(–t2);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:.45}
.empty-t{font-size:.95rem;font-weight:600}
.empty-h{font-size:.76rem;color:var(–t2);max-width:240px;line-height:1.65}

.chat-view{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;background:var(–bg);transform:translateX(100%);transition:transform .35s var(–ease);will-change:transform}
.chat-view.open{transform:translateX(0)}
.chat-tb{display:flex;align-items:center;gap:.7rem;padding:calc(var(–st) + .7rem) 1rem .65rem;background:rgba(15,15,20,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:.5px solid var(–bd);flex-shrink:0;z-index:5}
.back-btn{background:none;border:none;color:var(–acc);font-family:inherit;font-size:.92rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:.25rem;padding:.2rem .5rem .2rem 0;transition:opacity .2s}
.back-btn:active{opacity:.5}
.back-btn svg{width:11px;height:18px;fill:none;stroke:var(–acc);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.chat-tb-i{flex:1;min-width:0;cursor:pointer}
.chat-tb-name{font-size:.96rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-tb-tag{font-size:.7rem;color:var(–t2);font-family:‘IBM Plex Mono’,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.05rem}
.chat-tb-st{font-size:.72rem;color:var(–t2);margin-top:.02rem}
.chat-tb-st.on{color:var(–acc)}

.msgs-bg{position:absolute;inset:0;pointer-events:none;z-index:0}
.msgs{flex:1;overflow-y:auto;padding:.9rem 1rem;display:flex;flex-direction:column;gap:.22rem;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
.msgs::-webkit-scrollbar{width:0}
.dsep{display:flex;align-items:center;gap:.75rem;margin:.65rem 0;font-size:.64rem;letter-spacing:.06em;color:var(–t2);text-transform:uppercase}
.dsep::before,.dsep::after{content:’’;flex:1;height:1px;background:var(–bd)}
.mrow{display:flex;gap:.4rem;max-width:80%;animation:msgPop .35s cubic-bezier(.34,1.4,.4,1)}
.mrow.me{align-self:flex-end;flex-direction:row-reverse}
.mrow.them{align-self:flex-start}
.mav-s{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;flex-shrink:0;align-self:flex-end;overflow:hidden}
.mav-s img{width:100%;height:100%;object-fit:cover}
.mcol{display:flex;flex-direction:column;min-width:0}
.me .mcol{align-items:flex-end}
.bbl{padding:.55rem .9rem;border-radius:18px;font-size:.87rem;line-height:1.52;word-break:break-word}
.me .bbl{background:var(–mebub);border:.5px solid rgba(255,255,255,.05);border-bottom-right-radius:5px}
.them .bbl{background:var(–thembub);border:.5px solid rgba(255,255,255,.05);border-bottom-left-radius:5px}
/* Media-only bubble: no padding/border so the photo/video reaches the edge */
.bbl.media-only{padding:2px;background:transparent!important;border:none!important}
.mtime{font-size:.62rem;color:var(–t2);margin-top:.2rem;padding:0 .08rem}
.bbl-media{margin-top:.25rem;border-radius:12px;overflow:hidden;max-width:240px;cursor:pointer;display:grid;grid-template-columns:1fr 1fr;gap:2px}
.bbl-media.single{grid-template-columns:1fr}
.bbl-media>div{position:relative;aspect-ratio:1;overflow:hidden;background:var(–s3);border-radius:6px}
.bbl-media.single>div{aspect-ratio:auto;max-height:280px}
.bbl-media img,.bbl-media video{width:100%;height:100%;object-fit:cover;display:block}
.reply-quote{padding:.35rem .55rem;background:rgba(255,255,255,.04);border-left:2.5px solid var(–acc);border-radius:6px;margin-bottom:.35rem;cursor:pointer}
.reply-quote-name{font-size:.7rem;font-weight:700;color:var(–acc)}
.reply-quote-text{font-size:.75rem;color:var(–t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.edited{font-style:italic;opacity:.6;font-size:.62rem;margin-left:.25rem}
.mreacts{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.25rem}
.mreact{display:inline-flex;align-items:center;gap:.2rem;background:var(–s2);border:1px solid var(–bd);border-radius:14px;padding:.15rem .5rem;font-size:.78rem;cursor:pointer;animation:pop .35s var(–bounce)}
.mreact.mine{background:var(–acc2);border-color:rgba(59,130,246,.3)}
.mreact-count{font-size:.7rem;color:var(–t2);font-weight:600}
.mreact.mine .mreact-count{color:var(–acc)}

.reply-bar,.preview-bar{display:none;padding:.5rem .85rem;background:var(–s2);border-left:3px solid var(–acc);margin:0 1rem;border-radius:8px;align-items:center;gap:.6rem;animation:fadeUp .2s ease}
.reply-bar.show,.preview-bar.show{display:flex}
.reply-info,.preview-info{flex:1;min-width:0}
.reply-name{font-size:.7rem;font-weight:700;color:var(–acc)}
.reply-text,.preview-name{font-size:.74rem;color:var(–t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.05rem}
.reply-close,.preview-close{background:none;border:none;color:var(–t2);cursor:pointer;font-size:1rem;padding:.2rem .35rem}
.preview-thumbs{display:flex;gap:.3rem;flex-shrink:0}
.preview-thumb{width:42px;height:42px;border-radius:6px;overflow:hidden;background:var(–s3);position:relative}
.preview-thumb img,.preview-thumb video{width:100%;height:100%;object-fit:cover}
.preview-thumb-x{position:absolute;top:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(–red);color:#fff;font-size:.6rem;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700}

.ibar{display:flex;align-items:flex-end;gap:.4rem;padding:.75rem .8rem calc(var(–sb) + .75rem);border-top:.5px solid var(–bd);background:rgba(15,15,20,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);flex-shrink:0;position:relative;z-index:2}
.ibtn{width:36px;height:36px;border-radius:50%;flex-shrink:0;background:var(–s2);border:1px solid var(–bd);color:var(–t2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ibtn:active{transform:scale(.9)}
.ibtn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.itxt{flex:1;padding:.55rem .9rem;background:var(–s2);border:1.5px solid var(–bd);border-radius:20px;color:var(–t1);font-family:inherit;font-size:.88rem;resize:none;outline:none;max-height:130px;line-height:1.5;transition:border-color .2s;min-width:0}
.itxt:focus{border-color:var(–acc)}
.itxt::placeholder{color:var(–t3)}
.send-btn{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:var(–acc);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;animation:glow 3s ease infinite}
.send-btn:active{transform:scale(.9)}
.send-btn svg{width:16px;height:16px;fill:currentColor;margin-left:1px}
.voice-btn{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:var(–s2);border:1px solid var(–bd);color:var(–t1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.voice-btn:active{transform:scale(.92)}
.voice-btn svg{width:19px;height:19px}

.media-view{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;animation:fadeIn .25s ease}
.media-view.show{display:flex}
.media-view-close{position:absolute;top:calc(var(–st) + 1rem);right:1rem;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;z-index:2;backdrop-filter:blur(10px)}
.media-view img,.media-view video{max-width:100%;max-height:90vh;object-fit:contain}

.mm-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;animation:fadeIn .2s ease}
.mm-overlay.show{display:block}
/* Highlighted message during long-press (Telegram-style) - stays lifted while menu open */
.mrow.highlighted{position:relative;z-index:401;transform:scale(1.04)!important;transition:transform .25s var(–bounce)}
.mrow.highlighted .bbl{box-shadow:0 12px 38px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04)}
@keyframes msgLift{from{transform:scale(1)}to{transform:scale(1.04)}}
@keyframes msgShatter{0%{opacity:1;transform:scale(1) rotate(0);filter:blur(0)}40%{opacity:.7;transform:scale(1.06) rotate(-1deg);filter:blur(1px)}100%{opacity:0;transform:scale(.3) rotate(8deg) translateY(20px);filter:blur(6px)}}
.mrow.removing{animation:msgShatter .45s cubic-bezier(.4,0,.6,1) forwards;pointer-events:none;transition:margin .35s ease,height .35s ease}
.mrow{transition:transform .15s ease}
.mrow.swipe-hint::after{content:‘↩’;position:absolute;right:-32px;top:50%;transform:translateY(-50%);color:var(–acc);font-size:1.2rem;opacity:1}
.me.swipe-hint::after{right:auto;left:-32px}
.mm{position:fixed;background:rgba(38,38,46,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:.4rem 0;min-width:200px;max-width:260px;box-shadow:0 12px 40px rgba(0,0,0,.7);z-index:401;animation:menuPop .25s var(–bounce);overflow:hidden}
.mm-item{display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;cursor:pointer;color:var(–t1);font-size:.86rem;transition:background .12s;border:none;background:transparent;width:100%;font-family:inherit;text-align:left}
.mm-item:active{background:rgba(255,255,255,.06)}
.mm-item.danger{color:var(–red)}
.mm-item svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.mm-divider{height:1px;background:rgba(255,255,255,.06);margin:.2rem 0}

.rxn-row{position:fixed;display:flex;gap:.3rem;background:rgba(38,38,46,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:34px;padding:.5rem .65rem;box-shadow:0 8px 30px rgba(0,0,0,.6);z-index:402;animation:menuPop .25s var(–bounce);overflow-x:auto;max-width:calc(100vw - 20px);scrollbar-width:none}
.rxn-row::-webkit-scrollbar{height:0}
.rxn{width:42px;height:42px;flex-shrink:0;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.5rem;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.rxn:active{transform:scale(.85)}
.rxn-1{animation:r1 .8s ease infinite}
.rxn-2{animation:r2 .9s ease infinite}
.rxn-3{animation:r3 1s ease infinite}
.rxn-4{animation:r4 .9s ease infinite}
.rxn-5{animation:r5 1.1s ease infinite}
.rxn-6{animation:r6 .6s ease infinite}
.rxn-7{animation:r7 1s ease infinite}
.rxn-8{animation:r8 1.5s ease infinite}
.rxn-9{animation:r9 .7s ease infinite}
.rxn-10{animation:r10 1.6s ease infinite}
.rxn-11{animation:r11 1.2s ease infinite}
.rxn-12{animation:r12 1.4s ease infinite}
.rxn-13{animation:r13 1.6s linear infinite}
.rxn-14{animation:r14 .9s ease infinite}
.rxn-15{animation:r15 .35s ease infinite}
.rxn-16{animation:r16 1.4s ease infinite}
.rxn-17{animation:r17 1.6s ease infinite}
.rxn-18{animation:r18 1.3s ease infinite}
.rxn-19{animation:r19 1.8s ease infinite}
.rxn-20{animation:r20 1.1s ease infinite}
@keyframes r1{0%,100%{transform:scale(1) rotate(0)}30%{transform:scale(1.35) rotate(-18deg)}60%{transform:scale(1.1) rotate(12deg)}}
@keyframes r2{0%,100%{transform:scale(1) rotate(0)}30%{transform:scale(1.3) rotate(18deg)}60%{transform:scale(1.1) rotate(-12deg)}}
@keyframes r3{0%,100%{transform:scale(1)}15%{transform:scale(1.4)}30%{transform:scale(.95)}45%{transform:scale(1.3)}60%{transform:scale(1)}}
@keyframes r4{0%,100%{transform:scale(1) translateY(0);filter:drop-shadow(0 0 0 transparent)}50%{transform:scale(1.25) translateY(-3px);filter:drop-shadow(0 0 10px rgba(255,140,40,.9))}}
@keyframes r5{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.3) rotate(-8deg);filter:drop-shadow(0 0 6px rgba(255,150,180,.7))}75%{transform:scale(1.2) rotate(8deg)}}
@keyframes r6{0%,100%{transform:translateX(0) scale(1)}25%{transform:translateX(-4px) scale(1.15)}75%{transform:translateX(4px) scale(1.15)}}
@keyframes r7{0%,100%{transform:scale(1)}40%{transform:scale(1.25) rotate(-6deg)}60%{transform:scale(1.25) rotate(6deg)}}
@keyframes r8{0%,100%{transform:rotate(0)}33%{transform:rotate(-12deg)}66%{transform:rotate(12deg)}}
@keyframes r9{0%,100%{transform:scale(1) translateY(0)}40%{transform:scale(1.4) translateY(-6px);filter:drop-shadow(0 0 12px rgba(255,200,50,.9))}}
@keyframes r10{0%,100%{transform:translateY(0) rotate(0);filter:hue-rotate(0)}30%{transform:translateY(-2px) rotate(-6deg)}60%{transform:translateY(3px) rotate(6deg)}}
@keyframes r11{0%,100%{transform:rotate(-15deg) scale(1)}50%{transform:rotate(15deg) scale(1.25);filter:drop-shadow(0 0 8px rgba(255,200,50,.8))}}
@keyframes r12{0%,100%{transform:scale(1) rotate(0);filter:drop-shadow(0 0 0)}50%{transform:scale(1.3) rotate(8deg);filter:drop-shadow(0 0 12px rgba(255,220,80,.9))}}
@keyframes r13{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.2)}100%{transform:rotate(360deg) scale(1)}}
@keyframes r14{0%,100%{transform:scale(1) translateY(0) rotate(0)}40%{transform:scale(1.18) translateY(-3px) rotate(-4deg)}70%{transform:scale(1.18) translateY(-3px) rotate(4deg)}}
@keyframes r15{0%,100%{transform:translateX(0) rotate(0) scale(1)}25%{transform:translateX(-3px) rotate(-10deg) scale(1.15);filter:drop-shadow(0 0 6px rgba(255,80,80,.8))}75%{transform:translateX(3px) rotate(10deg) scale(1.15)}}
@keyframes r16{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.2) rotate(-8deg);filter:drop-shadow(0 0 8px rgba(255,200,100,.6))}}
@keyframes r17{0%,100%{transform:scale(1) translateY(0)}30%{transform:scale(1.1) translateY(-2px)}60%{transform:scale(1.15) translateY(1px)}}
@keyframes r18{0%,100%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.18);filter:drop-shadow(0 0 8px rgba(255,150,200,.7))}}
@keyframes r19{0%,100%{transform:scale(1) rotate(0)}40%{transform:scale(1.12) rotate(-5deg)}60%{transform:scale(1.12) rotate(5deg)}}
@keyframes r20{0%,100%{transform:scale(1)}40%{transform:scale(1.2) translateX(-2px)}60%{transform:scale(1.2) translateX(2px)}}

.emoji-pop{position:fixed;background:rgba(28,28,36,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.7);z-index:401;width:360px;max-width:calc(100vw - 24px);height:380px;display:flex;flex-direction:column;overflow:hidden;transform-origin:bottom left;transition:transform .35s cubic-bezier(.34,1.4,.5,1),opacity .25s ease;will-change:transform,opacity}
.emoji-pop.opening{animation:emojiPopOpen .4s cubic-bezier(.34,1.4,.5,1) both}
.emoji-pop.closing{animation:emojiPopClose .25s ease both}
@keyframes emojiPopOpen{from{opacity:0;transform:scale(.4) translateY(20px);filter:blur(4px)}to{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}}
@keyframes emojiPopClose{from{opacity:1;transform:scale(1) translateY(0)}to{opacity:0;transform:scale(.5) translateY(15px)}}
.emoji-cats{display:flex;padding:.5rem;gap:.3rem;border-bottom:1px solid var(–bd);overflow-x:auto;flex-shrink:0}
.emoji-cat{padding:.4rem .55rem;border:none;background:transparent;color:var(–t2);font-size:1.1rem;cursor:pointer;border-radius:8px;flex-shrink:0;transition:all .35s cubic-bezier(.34,1.5,.4,1)}
.emoji-cat.on{background:var(–acc2);color:var(–acc);transform:scale(1.1)}
.emoji-cats::-webkit-scrollbar{height:0}
.emoji-grid{flex:1;overflow-y:auto;padding:.3rem .3rem .5rem;display:block}
.emoji-grid::-webkit-scrollbar{width:0}
.emoji-section{margin-bottom:.3rem}
.emoji-section-h{position:sticky;top:0;background:rgba(28,28,36,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:.5rem .4rem .35rem;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(–t2);z-index:1}
.emoji-section-g{display:grid;grid-template-columns:repeat(7,1fr);gap:.1rem}
.emoji-btn{aspect-ratio:1;border:none;background:transparent;cursor:pointer;font-size:1.4rem;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:transform .25s var(–bounce),background .15s}
.emoji-btn:hover{background:var(–s2);transform:scale(1.35) rotate(-6deg)}
.emoji-btn:active{transform:scale(.85)}
/* Per-section hover variations for variety */
#emoji-sec-2 .emoji-btn:hover{transform:scale(1.35) rotate(15deg)} /* gestures - wave */
#emoji-sec-3 .emoji-btn:hover{transform:scale(1.4) translateY(-3px)} /* animals - jump */
#emoji-sec-4 .emoji-btn:hover{transform:scale(1.3) rotate(-12deg)} /* food - tilt */
#emoji-sec-5 .emoji-btn:hover{animation:emojiSpin .6s ease forwards} /* sports - spin */
#emoji-sec-6 .emoji-btn:hover{animation:emojiZoom .5s ease forwards} /* travel - zoom */
#emoji-sec-7 .emoji-btn:hover{animation:emojiPulse .55s ease forwards} /* objects - pulse */
@keyframes emojiSpin{from{transform:scale(1) rotate(0)}to{transform:scale(1.4) rotate(360deg)}}
@keyframes emojiZoom{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1.35)}}
@keyframes emojiPulse{0%,100%{transform:scale(1.3)}50%{transform:scale(1.5);filter:drop-shadow(0 0 8px var(–accg))}}

.cqc-overlay{position:fixed;inset:0;z-index:340;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:1.5rem;animation:fadeIn .2s ease}
.cqc-overlay.show{display:flex}
.cqc-card{width:100%;max-width:340px;background:var(–s1);border:1px solid var(–bd);border-radius:24px;padding:1.8rem 1.4rem 1.4rem;display:flex;flex-direction:column;align-items:center;gap:.55rem;animation:fadeUp .35s var(–ease)}
.cqc-name{font-size:1.15rem;font-weight:700;text-align:center}
.cqc-tag{font-size:.82rem;color:var(–t2);font-family:‘IBM Plex Mono’,monospace}
.cqc-status{font-size:.74rem;margin-top:.2rem}
.cqc-status.on{color:var(–acc)}
.cqc-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem;width:100%;margin-top:1rem}
.cqc-action{display:flex;flex-direction:column;align-items:center;gap:.32rem;padding:.85rem .5rem;background:var(–s2);border:1px solid var(–bd);border-radius:14px;cursor:pointer;color:var(–t1);font-family:inherit;transition:all .15s}
.cqc-action:active{background:var(–s3);transform:scale(.96)}
.cqc-action svg{width:22px;height:22px;fill:none;stroke:var(–acc);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cqc-action span{font-size:.75rem;font-weight:600}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;padding:1.5rem;animation:fadeIn .2s ease}
.modal.show{display:flex}
.modal-card{background:var(–s1);border:1px solid var(–bd);border-radius:20px;padding:1.5rem 1.4rem 1.2rem;max-width:340px;width:100%;animation:fadeUp .3s var(–ease)}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:.5rem;text-align:center}
.modal-text{font-size:.84rem;color:var(–t2);text-align:center;margin-bottom:1.2rem;line-height:1.55}
.modal-btns{display:flex;gap:.5rem}
.modal-btn{flex:1;padding:.7rem;border:none;border-radius:11px;font-family:inherit;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .15s}
.modal-btn.cancel{background:var(–s2);color:var(–t1)}
.modal-btn.confirm{background:var(–red);color:#fff}
.modal-btn:active{transform:scale(.97)}

.page{position:fixed;inset:0;z-index:280;display:flex;flex-direction:column;background:var(–bg);transform:translateX(100%);transition:transform .35s var(–ease)}
.page.open{transform:translateX(0)}
.page-tb{display:flex;align-items:center;gap:.7rem;padding:calc(var(–st) + .7rem) 1rem .65rem;background:rgba(15,15,20,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:.5px solid var(–bd);flex-shrink:0}
.page-title{flex:1;font-size:1rem;font-weight:700;text-align:center}
.page-save{background:none;border:none;color:var(–acc);font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;padding:.2rem .5rem}
.page-body{flex:1;overflow-y:auto;padding:1.5rem 1rem;-webkit-overflow-scrolling:touch}
.page-body::-webkit-scrollbar{width:0}

.pcard{background:var(–s1);border:1px solid var(–bd);border-radius:22px;padding:1.5rem 1.2rem 1.3rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;animation:fadeUp .35s var(–ease);margin-bottom:1rem}
.pc-name{font-size:1.05rem;font-weight:700;text-align:center}
.pc-user{font-size:.78rem;color:var(–t2);font-family:‘IBM Plex Mono’,monospace}
.pc-fullname{font-size:.78rem;color:var(–t2);text-align:center;margin-top:.1rem}

.srow{display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;cursor:pointer;transition:background .15s}
.srow:active{background:var(–s2)}
.srow-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff}
.srow-ico svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.srow-info{flex:1}
.srow-t{font-size:.9rem;font-weight:500}
.srow-s{font-size:.73rem;color:var(–t2);margin-top:.06rem}
.srow-arr{color:var(–t3);font-size:.95rem}

.sec-btn{display:flex;align-items:center;gap:.85rem;padding:1rem 1.1rem;background:var(–s1);border:1px solid var(–bd);border-radius:14px;cursor:pointer;color:var(–t1);font-family:inherit;text-align:left;width:100%;margin-bottom:.7rem;transition:all .15s}
.sec-btn:active{background:var(–s2);transform:scale(.99)}
.sec-btn.danger{border-color:rgba(255,69,58,.25);background:rgba(255,69,58,.08);color:var(–red)}
.sec-btn-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(–s2)}
.sec-btn.danger .sec-btn-ico{background:rgba(255,69,58,.18);color:var(–red)}
.sec-btn-ico svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.sec-btn-info{flex:1}
.sec-btn-t{font-size:.92rem;font-weight:600}
.sec-btn-s{font-size:.74rem;color:var(–t2);margin-top:.1rem}
.sec-btn.danger .sec-btn-s{color:rgba(255,69,58,.7)}

body[data-theme=“red”]{–acc:#ff4d6d;–acc2:rgba(255,77,109,.16);–accg:rgba(255,77,109,.32);–mebub:#3a0d18;–mebrd:rgba(255,77,109,.22)}
body[data-theme=“blue”]{–acc:#3b82f6;–acc2:rgba(59,130,246,.16);–accg:rgba(59,130,246,.32);–mebub:#0e1d3a;–mebrd:rgba(59,130,246,.22)}
body[data-theme=“green”]{–acc:#10b981;–acc2:rgba(16,185,129,.16);–accg:rgba(16,185,129,.32);–mebub:#0a2d22;–mebrd:rgba(16,185,129,.22)}
body[data-theme=“white”]{–acc:#e5e5ea;–acc2:rgba(229,229,234,.14);–accg:rgba(229,229,234,.28);–mebub:#2a2a30;–mebrd:rgba(229,229,234,.2)}
body[data-theme=“gray”]{–acc:#9ca3af;–acc2:rgba(156,163,175,.16);–accg:rgba(156,163,175,.3);–mebub:#252830;–mebrd:rgba(156,163,175,.22)}
body[data-theme=“sky”]{–acc:#60d8f7;–acc2:rgba(96,216,247,.16);–accg:rgba(96,216,247,.32);–mebub:#0a2530;–mebrd:rgba(96,216,247,.22)}
body[data-theme=“forest”]{–acc:#5e8b3a;–acc2:rgba(94,139,58,.18);–accg:rgba(94,139,58,.34);–mebub:#1a2812;–mebrd:rgba(94,139,58,.25)}

const STORE_NAME='telegaforce_v1';
const KEYS={users:'users',messages:'messages',session:'session',prefs:'prefs',pins:'pins',favs:'favs',customNames:'customNames',reqs:'reqs',friends:'friends',blocks:'blocks'};

let idb=null;
function openIDB(){
  return new Promise((res)=>{
    if(!window.indexedDB){res(null);return;}
    const req=indexedDB.open('telegaforce',1);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE_NAME))db.createObjectStore(STORE_NAME);};
    req.onsuccess=e=>{idb=e.target.result;res(idb);};
    req.onerror=()=>res(null);
  });
}
async function idbGet(key){
  if(!idb)await openIDB();if(!idb)return null;
  return new Promise(r=>{
    try{const tx=idb.transaction(STORE_NAME,'readonly').objectStore(STORE_NAME).get(key);
      tx.onsuccess=()=>r(tx.result);tx.onerror=()=>r(null);}catch(_){r(null);}
  });
}
async function idbSet(key,val){
  if(!idb)await openIDB();if(!idb)return;
  return new Promise(r=>{
    try{const tx=idb.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).put(val,key);
      tx.onsuccess=()=>r(true);tx.onerror=()=>r(false);}catch(_){r(false);}
  });
}
async function idbDel(key){
  if(!idb)await openIDB();if(!idb)return;
  return new Promise(r=>{
    try{const tx=idb.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).delete(key);
      tx.onsuccess=()=>r(true);tx.onerror=()=>r(false);}catch(_){r(false);}
  });
}

function getStore(key){
  try{const v=localStorage.getItem('tf_'+key);if(v)return JSON.parse(v);}catch(_){}
  return null;
}
function setStore(key,val){
  try{localStorage.setItem('tf_'+key,JSON.stringify(val));}catch(_){}
  idbSet(key,val).catch(()=>{});
}
async function restoreFromIDB(){
  for(const k of Object.values(KEYS)){
    if(k===KEYS.session)continue;
    const lsVal=localStorage.getItem('tf_'+k);
    if(!lsVal){
      const idbVal=await idbGet(k);
      if(idbVal!==null&&idbVal!==undefined){
        try{localStorage.setItem('tf_'+k,JSON.stringify(idbVal));}catch(_){}
      }
    }
  }
}

function attachSwipeReply(row,idx){
  let startX=0,startY=0,active=false,dx=0,locked=false;
  const isMe=row.classList.contains('me');
  row.style.position='relative';
  const onStart=(x,y)=>{
    if(row.classList.contains('highlighted'))return;
    startX=x;startY=y;active=true;dx=0;locked=false;
  };
  const onMove=(x,y)=>{
    if(!active||row.classList.contains('highlighted'))return;
    const ax=x-startX, ay=y-startY;
    if(!locked){
      if(Math.abs(ax)<6 && Math.abs(ay)<6) return;
      if(Math.abs(ay)>Math.abs(ax)){active=false;row.style.transform='';return;}
      locked=true;
    }
    if(isMe&&ax>0){dx=0;}
    else if(!isMe&&ax<0){dx=0;}
    else{dx=Math.max(-80,Math.min(80,ax));}
    row.style.transform='translate3d('+dx+'px,0,0)';
    if(Math.abs(dx)>45)row.classList.add('swipe-hint');
    else row.classList.remove('swipe-hint');
  };
  const onEnd=()=>{
    if(row.classList.contains('highlighted'))return;
    if(!active){row.style.transform='';row.classList.remove('swipe-hint');return;}
    active=false;
    const trigger=Math.abs(dx)>45;
    row.style.transform='';
    row.classList.remove('swipe-hint');
    if(trigger){activeMsgIdx=idx;doReply();}
  };
  row.addEventListener('touchstart',e=>onStart(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  row.addEventListener('touchmove',e=>onMove(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  row.addEventListener('touchend',onEnd);
  row.addEventListener('touchcancel',onEnd);
}

let actx=null;
function ictx(){if(actx)return actx;try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(_){}return actx;}
document.addEventListener('touchstart',()=>{const a=ictx();if(a&&a.state==='suspended')a.resume();},{once:true,passive:true});
document.addEventListener('click',()=>{const a=ictx();if(a&&a.state==='suspended')a.resume();},{once:true});
function sndSend(){
  const c=ictx();if(!c)return;const t=c.currentTime;
  const o=c.createOscillator(),g=c.createGain(),f=c.createBiquadFilter();
  f.type='lowpass';f.frequency.value=2800;
  o.type='triangle';
  o.frequency.setValueAtTime(420,t);
  o.frequency.exponentialRampToValueAtTime(1400,t+.13);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(.14,t+.015);
  g.gain.exponentialRampToValueAtTime(.0001,t+.22);
  o.connect(f);f.connect(g);g.connect(c.destination);
  o.start(t);o.stop(t+.24);
}
function sndReceive(){
  const c=ictx();if(!c)return;const t=c.currentTime;
  const o1=c.createOscillator(),g1=c.createGain(),f1=c.createBiquadFilter();
  f1.type='lowpass';f1.frequency.value=3500;
  o1.type='sine';
  o1.frequency.setValueAtTime(1800,t);
  o1.frequency.exponentialRampToValueAtTime(680,t+.09);
  g1.gain.setValueAtTime(0,t);
  g1.gain.linearRampToValueAtTime(.2,t+.008);
  g1.gain.exponentialRampToValueAtTime(.0001,t+.22);
  o1.connect(f1);f1.connect(g1);g1.connect(c.destination);
  o1.start(t);o1.stop(t+.24);
  const o2=c.createOscillator(),g2=c.createGain();
  o2.type='sine';o2.frequency.value=540;
  g2.gain.setValueAtTime(0,t+.05);
  g2.gain.linearRampToValueAtTime(.08,t+.07);
  g2.gain.exponentialRampToValueAtTime(.0001,t+.3);
  o2.connect(g2);g2.connect(c.destination);
  o2.start(t+.05);o2.stop(t+.32);
}

function handleRegAvatar(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>3*1024*1024){toast(isRu?'Файл слишком большой (макс 3 МБ)':'File too large (max 3 MB)');return;}
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const max=256,s=Math.min(max/img.width,max/img.height,1);
      c.width=img.width*s;c.height=img.height*s;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      regAvatar=c.toDataURL('image/jpeg',.85);
      const p=document.getElementById('avu-preview');p.src=regAvatar;p.style.display='block';
      document.getElementById('avu-icon').style.display='none';
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

async function doRegister(){
  const u=document.getElementById('r-u').value.trim().toLowerCase().replace(/^@/,'');
  const fn=document.getElementById('r-fn').value.trim();
  const ln=document.getElementById('r-ln').value.trim();
  const mn=document.getElementById('r-mn').value.trim();
  const p=document.getElementById('r-p').value;
  if(!u||!fn||!ln||!p){showErr(T.eFill);return;}
  if(!/^[a-z0-9_]{3,20}$/.test(u)){showErr(T.eUser);return;}
  if(p.length<4){showErr(T.ePass);return;}

  const userObj={username:u,firstName:fn,lastName:ln,middleName:mn,display:fn+' '+ln,password:p,avatar:regAvatar||null,createdAt:Date.now()};

  if(USE_SERVER){
    try{
      const r=await fetch(SERVER_URL+'/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(userObj)});
      const d=await r.json();
      if(!r.ok){showErr(d.error==='Username taken'?T.eTaken.replace('{u}',u):d.error);return;}
    }catch(e){showErr('Server unreachable');return;}
  }

  const users=gU();
  if(users[u]){showErr(T.eTaken.replace('{u}',u));return;}
  users[u]=userObj;sU(users);
  toast(T.toastOk);
  switchAuthTab('l');
  setTimeout(()=>{document.getElementById('l-u').value=u;document.getElementById('l-p').value='';document.getElementById('l-p').focus();},200);
  document.getElementById('r-u').value='';document.getElementById('r-fn').value='';document.getElementById('r-ln').value='';document.getElementById('r-mn').value='';document.getElementById('r-p').value='';
  regAvatar=null;
  document.getElementById('avu-preview').style.display='none';
  document.getElementById('avu-icon').style.display='block';
}

async function doLogin(){
  const u=document.getElementById('l-u').value.trim().toLowerCase().replace(/^@/,'');
  const p=document.getElementById('l-p').value;

  if(USE_SERVER){
    try{
      const r=await fetch(SERVER_URL+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
      const d=await r.json();
      if(!r.ok){showErr(T.eWrong);return;}
      const users=gU();users[u]={...d.user,password:p};sU(users);
      try{const ru=await fetch(SERVER_URL+'/api/users');const list=await ru.json();list.forEach(usr=>{if(!users[usr.username])users[usr.username]={...usr};else users[usr.username]={...users[usr.username],...usr};});sU(users);}catch(_){}
    }catch(e){showErr('Server unreachable');return;}
  }else{
    const users=gU();
    if(!users[u]||users[u].password!==p){showErr(T.eWrong);return;}
  }
  setStore(KEYS.session,{username:u,password:p});
  launch(u,p);
}

let _lastTickSnap={chats:'',msgs:'',contacts:''};
function tick(){
  const u=gU();if(!u[me.username])return;
  u[me.username].lastSeen=Date.now();sU(u);
  const msgs=gM();
  if(curTab==='chats'){
    const snap=JSON.stringify(Object.keys(msgs).map(k=>[k,(msgs[k]||[]).at(-1)?.ts,(msgs[k]||[]).length]))+'|'+Object.values(u).map(x=>x.username+':'+(x.lastSeen>Date.now()-9000?'on':'off')).join(',');
    if(snap!==_lastTickSnap.chats){_lastTickSnap.chats=snap;renderChats(document.getElementById('chat-srch').value);}
  }
  if(curTab==='contacts'){
    const snap=Object.values(u).map(x=>x.username+':'+(x.lastSeen>Date.now()-9000?'on':'off')+':'+(x.avatar?'a':'')+':'+x.display).join(',');
    if(snap!==_lastTickSnap.contacts){_lastTickSnap.contacts=snap;renderContacts();}
  }
  if(activeChat){
    const key=activeChat===FAV?favKey():ckey(me.username,activeChat);
    const snap=(msgs[key]||[]).map(m=>m.ts+':'+(m.text||'').length+':'+(m.edited?'e':'')+':'+Object.keys(m.reactions||{}).join(',')).join('|');
    if(snap!==_lastTickSnap.msgs){_lastTickSnap.msgs=snap;renderMsgs();}
  }
  updateUnreadDot();
  if(USE_SERVER&&wsReady){try{ws.send(JSON.stringify({type:'ping'}));}catch(_){}}
}
function updateUnreadDot(){
  const msgs=gM();let total=0;
  Object.keys(msgs).forEach(k=>{if(k.includes(me.username))total+=msgs[k].filter(m=>m.to===me.username&&!m.read).length;});
  document.getElementById('dot-chats').classList.toggle('show',total>0);
}

function showServerStatus(online){

  else{el.textContent=T.serverOffline;el.classList.remove('online');el.classList.add('show');}
}

function connectWS(){
  if(!USE_SERVER)return;
  const wsUrl=SERVER_URL.replace(/^http/,'ws');
  try{
    ws=new WebSocket(wsUrl);
    ws.onopen=()=>{ws.send(JSON.stringify({type:'auth',username:me.username,password:me.password}));};
    ws.onmessage=evt=>{try{onWS(JSON.parse(evt.data));}catch(_){}};
    ws.onclose=()=>{wsReady=false;showServerStatus(false);setTimeout(connectWS,3000);};
    ws.onerror=()=>{wsReady=false;};
  }catch(_){setTimeout(connectWS,3000);}
}
function onWS(d){
  if(d.type==='auth-ok'){wsReady=true;showServerStatus(true);syncFromServer();return;}
  if(d.type==='auth-fail'){toast('Auth failed');return;}
  if(d.type==='msg'){
    const m=d.message,key=d.key;
    const msgs=gM();msgs[key]=msgs[key]||[];
    if(!msgs[key].some(x=>x.ts===m.ts&&x.from===m.from)){
      msgs[key].push(m);sM(msgs);
      if(m.from!==me.username)sndReceive();
      if(curTab==='chats')renderChats(document.getElementById('chat-srch').value);
      if(activeChat&&(m.from===activeChat||m.to===activeChat))renderMsgs();
      else if(m.to===me.username&&m.text){const u=gU();toast('💬 '+(u[m.from]?.display||m.from)+': '+m.text.slice(0,40));}
      updateUnreadDot();
    }
  }
  if(d.type==='edit'){const msgs=gM();const arr=msgs[d.key];if(arr){const m=arr.find(x=>x.ts===d.ts);if(m){m.text=d.text;m.edited=true;sM(msgs);if(activeChat)renderMsgs();}}}
  if(d.type==='delMsg'){const msgs=gM();if(msgs[d.key]){msgs[d.key]=msgs[d.key].filter(x=>x.ts!==d.ts);sM(msgs);if(activeChat)renderMsgs();renderChats();}}
  if(d.type==='react'){const msgs=gM();const arr=msgs[d.key];if(arr){const m=arr.find(x=>x.ts===d.ts);if(m){m.reactions=d.reactions;sM(msgs);if(activeChat)renderMsgs();}}}
  if(d.type==='presence'){const u=gU();if(u[d.username]){u[d.username].lastSeen=d.online?Date.now():(Date.now()-30000);sU(u);if(curTab==='chats')renderChats(document.getElementById('chat-srch').value);if(curTab==='contacts')renderContacts();}}
  if(d.type==='userlist'){const users=gU();d.users.forEach(usr=>{users[usr.username]={...users[usr.username],...usr};});sU(users);if(curTab==='contacts')renderContacts();}
}
async function syncFromServer(){
  if(!USE_SERVER)return;
  try{
    const r=await fetch(SERVER_URL+'/api/users');const list=await r.json();
    const users=gU();list.forEach(usr=>{users[usr.username]={...users[usr.username],...usr};});sU(users);
    if(curTab==='contacts')renderContacts();
    if(curTab==='chats')renderChats();
  }catch(_){}
}

function onBC(e){
  const{t,from,to,text}=e.data||{};
  if(t==='msg'&&(to===me.username||from===me.username)){
    if(to===me.username&&from!==me.username)sndReceive();
    if(curTab==='chats') renderChats(document.getElementById('chat-srch').value);
    if(activeChat===from||activeChat===to) renderMsgs();
    else if(to===me.username&&text){const u=gU();toast('💬 '+(u[from]?.display||from)+': '+(text||'').slice(0,40));}
    updateUnreadDot();
  }
  if(t==='profile'){
    document.querySelectorAll('.av,.crname,.chat-tb-name,.pc-name').forEach(el=>{
      el.style.transition='opacity .4s,filter .4s';
      el.style.opacity='0.3';el.style.filter='blur(4px)';
      setTimeout(()=>{el.style.opacity='';el.style.filter='';},200);
    });
    setTimeout(()=>{
      if(curTab==='chats') renderChats(document.getElementById('chat-srch').value);
      if(curTab==='contacts') renderContacts();
      if(activeChat) renderMsgs();
    },220);
  }
}

function renderChats(filter=''){
  const users=gU(),msgs=gM(),list=document.getElementById('chat-list');
  list.innerHTML='';
  const pins=getPins();

  let cnts=Object.values(users).filter(u=>u.username!==me.username);
  if(filter){const f=filter.toLowerCase();cnts=cnts.filter(u=>(u.display||'').toLowerCase().includes(f)||u.username.toLowerCase().includes(f));}
  const havePeople=cnts.filter(u=>(msgs[ckey(me.username,u.username)]||[]).length>0);

  const allEntries=[...havePeople];
  const favTs=(msgs[favKey()]||[]).at(-1)?.ts||0;
  const favName=(T.fav||'').toLowerCase();
  if(!filter || favName.includes(filter.toLowerCase())){
    allEntries.push({username:FAV,_favTs:favTs,_isFav:true});
  }

  const pinnedChats=allEntries.filter(u=>pins.includes(u.username))
    .sort((a,b)=>pins.indexOf(a.username)-pins.indexOf(b.username));
  const regularChats=allEntries.filter(u=>!pins.includes(u.username))
    .sort((a,b)=>{
      const aTs=a._isFav?a._favTs:((msgs[ckey(me.username,a.username)]||[]).at(-1)?.ts||0);
      const bTs=b._isFav?b._favTs:((msgs[ckey(me.username,b.username)]||[]).at(-1)?.ts||0);
      return bTs-aTs;
    });

  const have=havePeople;

  if(allEntries.length===0){
    const em=document.createElement('div');em.className='empty';
    em.innerHTML='<div class="empty-ico"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><div class="empty-t">'+T.noChats+'</div><div class="empty-h">'+T.noChatsH+'</div>';
    list.appendChild(em);return;
  }

  const renderOne=u=>{
    if(u._isFav){
      const fav=msgs[favKey()]||[];const last=fav.at(-1);
      list.appendChild(makeRow({uname:FAV,disp:T.fav,prev:last?(T.you+(last.text||'').slice(0,32)):T.favHint,ts:last?.ts||null,unread:0,online:false,isFav:true,pinned:pins.includes(FAV)}));
      return;
    }
    const cu=getContactObj(u.username);
    const key=ckey(me.username,u.username),chat=msgs[key]||[],last=chat.at(-1);
    const unread=chat.filter(m=>m.to===me.username&&!m.read).length;
    const online=u.lastSeen&&(Date.now()-u.lastSeen<9000);
    const lastTxt=last?(last.text||(last.voice?'🎤 '+(isRu?'Голосовое':'Voice'):last.circle?'⏺ '+(isRu?'Видеосообщение':'Video circle'):(last.medias||last.media)?(((last.medias&&last.medias[0])||last.media)?.type==='video'?'🎥':'📷'):'')):'';
    list.appendChild(makeRow({user:cu,uname:u.username,disp:cu.display,prev:last?(last.from===me.username?T.you:'')+lastTxt.slice(0,35):('@'+u.username),ts:last?.ts||null,unread,online,pinned:pins.includes(u.username)}));
  };

  if(pinnedChats.length&&!filter){
    pinnedChats.forEach(renderOne);
  }
  if(regularChats.length){
    regularChats.forEach(renderOne);
  }
}

function makeRow({user,uname,disp,prev,ts,unread,online,isFav,pinned}){
  const d=document.createElement('div');
  d.className='crow'+(activeChat===uname?' act':'')+(pinned?' pinned':'');
  d.onclick=()=>openChat(uname);
  longPress(d,()=>openChatMenu(uname,d));

  aw.appendChild(av);
  if(!isFav){const dot=document.createElement('div');dot.className='odot';dot.style.background=online?'var(--acc)':'var(--bd)';aw.appendChild(dot);}

  const ci=document.createElement('div');ci.className='crinfo';

  d.appendChild(aw);d.appendChild(ci);d.appendChild(cr);
  return d;
}

    list.appendChild(lbl);

      list.appendChild(lbl);
    }
    otherContacts.forEach(renderOne);
  }
}

  document.getElementById('cqc-tag').textContent='@'+u.username;
  const online=realU.lastSeen&&(Date.now()-realU.lastSeen<9000);
  const st=document.getElementById('cqc-status');
  st.textContent=online?T.online:T.offline;st.className='cqc-status'+(online?' on':'');
  const isFav=getFavs().includes(uname);
  document.getElementById('cqc-fav-lbl').textContent=isFav?T.cqcUnfav:T.cqcFav;
  const isBl=iBlocked(uname);
  document.getElementById('cqc-block-lbl').textContent=isBl?T.unblock:T.block;
  document.getElementById('cqc-overlay').classList.add('show');
}
function closeContactQuick(){document.getElementById('cqc-overlay').classList.remove('show');}
function cqcAction(type){
  const target=cqcUser;
  if(type==='chat'){
    closeContactQuick();
    if(activeChat===target)return;
    if(iBlocked(target)){toast(T.cantWriteIBlocked);return;}
    if(iAmBlockedBy(target)){toast(T.cantWriteBlocked);return;}
    if(targetRequiresRequest(target)){
      showModal(T.sendReqTitle,T.sendReqText,T.sendReqBtn,()=>{
        sendFriendRequest(target);
      });
      return;
    }
    setTab('chats');setTimeout(()=>openChat(target),250);
  }
  else if(type==='call'){closeContactQuick();toast(T.callsSoon);}
  else if(type==='fav'){
    let favs=getFavs();
    const idx=favs.indexOf(target);
    if(idx>=0)favs.splice(idx,1);else favs.unshift(target);
    setFavs(favs);
    closeContactQuick();renderContacts();
  }
  else if(type==='block'){
    let bl=getBlocks();
    if(bl.includes(target)){bl=bl.filter(u=>u!==target);setBlocks(bl);toast(isRu?'Разблокирован':'Unblocked');}
    else{bl.push(target);setBlocks(bl);toast(T.blocked);}
    closeContactQuick();renderContacts();renderChats();
  }
}

  if(epAvatar){prev.src=epAvatar;prev.style.display='block';ico.style.display='none';}

function handleEpAvatar(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>3*1024*1024){toast(isRu?'Файл слишком большой (макс 3 МБ)':'File too large (max 3 MB)');return;}
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const max=256,s=Math.min(max/img.width,max/img.height,1);
      c.width=img.width*s;c.height=img.height*s;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      epAvatar=c.toDataURL('image/jpeg',.85);
      const p=document.getElementById('ep-avatar-preview');p.src=epAvatar;p.style.display='block';
      document.getElementById('ep-avu-icon').style.display='none';
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

function saveEditProfile(){
  const newU=document.getElementById('ep-u').value.trim().toLowerCase().replace(/^@/,'');
  const fn=document.getElementById('ep-fn').value.trim();
  const ln=document.getElementById('ep-ln').value.trim();
  const mn=document.getElementById('ep-mn').value.trim();
  const err=document.getElementById('ep-err');err.classList.remove('show');
  if(!newU||!fn||!ln){err.textContent=T.eFill;err.classList.remove('show');void err.offsetWidth;err.classList.add('show');return;}
  if(!/^[a-z0-9_]{3,20}$/.test(newU)){err.textContent=T.eUser;err.classList.remove('show');void err.offsetWidth;err.classList.add('show');return;}
  const users=gU();
  if(newU!==me.username){
    if(users[newU]){err.textContent=T.eTaken.replace('{u}',newU);err.classList.remove('show');void err.offsetWidth;err.classList.add('show');return;}
    const oldU=me.username;
    users[newU]={...users[oldU],username:newU};
    delete users[oldU];
    const msgs=gM();const newMsgs={};
    const oldFavKey='__fav__::'+oldU;
    const newFavKey='__fav__::'+newU;
    Object.keys(msgs).forEach(k=>{
      let nk=k;
      if(k===oldFavKey){nk=newFavKey;}
      else if(k.includes(oldU)){
        const parts=k.split('::');
        const a=parts[0]===oldU?newU:parts[0];
        const b=parts[1]===oldU?newU:parts[1];
        nk=[a,b].sort().join('::');
      }
      newMsgs[nk]=msgs[k].map(m=>({
        ...m,
        from:m.from===oldU?newU:m.from,
        to:m.to===oldU?newU:m.to
      }));
    });
    sM(newMsgs);
    const sess=getStore(KEYS.session);if(sess){sess.username=newU;setStore(KEYS.session,sess);}
    me.username=newU;
  }
  const target=users[newU];
  target.firstName=fn;target.lastName=ln;target.middleName=mn;
  target.display=fn+' '+ln;
  if(epAvatar!==undefined)target.avatar=epAvatar;
  sU(users);
  me=target;
  buildSettings();renderChats();renderContacts();
  if(activeChat)renderMsgs();
  try{bc&&bc.postMessage({t:'profile',from:me.username});}catch(_){}
  toast(T.toastSaved);
  closePage('edit-profile-page');
}

function acceptRequest(uname){
  let reqs=getReqs();reqs=reqs.filter(u=>u!==uname);setReqsFor(me.username,reqs);
  let myF=getFriends();if(!myF.includes(uname))myF.push(uname);setFriendsFor(me.username,myF);
  let theirF=getFriends(uname);if(!theirF.includes(me.username))theirF.push(me.username);setFriendsFor(uname,theirF);
  renderPrivacy();
  toast(isRu?'Заявка принята':'Request accepted');
}
function rejectRequest(uname){
  let reqs=getReqs();reqs=reqs.filter(u=>u!==uname);setReqsFor(me.username,reqs);
  renderPrivacy();
}
function unblockUser(uname){
  let bl=getBlocks();bl=bl.filter(u=>u!==uname);setBlocks(bl);
  renderPrivacy();
}

function isFriendOf(targetUser){
  return getFriends(targetUser).includes(me.username);
}
function targetRequiresRequest(targetUser){
  const allPrefs=getStore(KEYS.prefs)||{};
  const targetP=allPrefs[targetUser]||{};
  if(!targetP.friendsOnly)return false;
  return !isFriendOf(targetUser);
}
function sendFriendRequest(targetUser){
  let theirReqs=getReqs(targetUser);
  if(!theirReqs.includes(me.username))theirReqs.push(me.username);
  setReqsFor(targetUser,theirReqs);
  toast(T.reqSent);
}

function iAmBlockedBy(targetUser){
  const allBlocks=getStore(KEYS.blocks)||{};
  return (allBlocks[targetUser]||[]).includes(me.username);
}
function iBlocked(targetUser){
  return getBlocks().includes(targetUser);
}

function handleAttach(e){
  const files=Array.from(e.target.files||[]);e.target.value='';
  if(!files.length)return;

  const isVid=f=>f.type.startsWith('video/');
  const vids=files.filter(isVid),imgs=files.filter(f=>!isVid(f));
  const limited=vids.length?vids.slice(0,2):imgs.slice(0,3);
  if(vids.length>2)toast(isRu?'Максимум 2 видео':'Max 2 videos');
  else if(imgs.length>3)toast(isRu?'Максимум 3 фото':'Max 3 photos');

  let processed=0;
  pendingAttachments=[];
  limited.forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{
      if(isVid(f)){
        if(f.size>10*1024*1024){toast(isRu?'Видео >10MB':'Video >10MB');processed++;if(processed===limited.length)showPreview();return;}
        const v=document.createElement('video');v.preload='metadata';
        v.onloadedmetadata=()=>{
          if(v.duration>60){toast(isRu?'Видео >1 минуты':'Video >1 min');processed++;if(processed===limited.length)showPreview();return;}
          pendingAttachments.push({type:'video',data:ev.target.result,name:f.name});
          processed++;if(processed===limited.length)showPreview();
        };
        v.onerror=()=>{processed++;if(processed===limited.length)showPreview();};
        v.src=ev.target.result;
      }else{
        const img=new Image();
        img.onload=()=>{
          const c=document.createElement('canvas');
          const max=1280,s=Math.min(max/img.width,max/img.height,1);
          c.width=img.width*s;c.height=img.height*s;
          c.getContext('2d').drawImage(img,0,0,c.width,c.height);
          pendingAttachments.push({type:'image',data:c.toDataURL('image/jpeg',.85),name:f.name});
          processed++;if(processed===limited.length)showPreview();
        };
        img.src=ev.target.result;
      }
    };
    r.readAsDataURL(f);
  });
}
function showPreview(){
  const bar=document.getElementById('preview-bar');
  if(!pendingAttachments.length){bar.classList.remove('show');return;}
  const wrap=document.getElementById('preview-thumbs');wrap.innerHTML='';
  pendingAttachments.forEach((a,i)=>{
    const t=document.createElement('div');t.className='preview-thumb';
    if(a.type==='image'){const im=document.createElement('img');im.src=a.data;t.appendChild(im);}
    else{const v=document.createElement('video');v.src=a.data;v.muted=true;t.appendChild(v);}
    const x=document.createElement('div');x.className='preview-thumb-x';x.textContent='×';
    x.onclick=()=>{pendingAttachments.splice(i,1);showPreview();};
    t.appendChild(x);wrap.appendChild(t);
  });
  document.getElementById('preview-name').textContent=pendingAttachments.length+(isRu?' файл(ов)':' file(s)');
  bar.classList.add('show');
}

function compressImage(dataUrl,quality){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const max=quality==='HD'?1920:960;
      const s=Math.min(max/img.width,max/img.height,1);
      c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',quality==='HD'?.92:.78));
    };

function drawCropBox(wrap){
  let box=wrap.querySelector('.crop-box');
  if(!box){
    box=document.createElement('div');box.className='crop-box';

    initCropDrag(box,wrap);
  }
  const img=wrap.querySelector('img');
  const imgRect=img.getBoundingClientRect(),wrapRect=wrap.getBoundingClientRect();
  const offX=imgRect.left-wrapRect.left,offY=imgRect.top-wrapRect.top;
  box.style.left=(offX+cropState.x)+'px';
  box.style.top=(offY+cropState.y)+'px';
  box.style.width=cropState.w+'px';
  box.style.height=cropState.h+'px';
}

function initCropDrag(box,wrap){
  let mode=null,startX=0,startY=0,startState=null;
  const onDown=(e,m)=>{
    e.preventDefault();e.stopPropagation();
    mode=m;
    const p=e.touches?e.touches[0]:e;
    startX=p.clientX;startY=p.clientY;
    startState={...cropState};
    document.addEventListener('mousemove',onMove);
    document.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('mouseup',onUp);
    document.addEventListener('touchend',onUp);
  };
  const onMove=(e)=>{
    e.preventDefault();
    const p=e.touches?e.touches[0]:e;
    const dx=p.clientX-startX,dy=p.clientY-startY;
    if(mode==='move'){
      cropState.x=Math.max(0,Math.min(cropState.dispW-cropState.w,startState.x+dx));
      cropState.y=Math.max(0,Math.min(cropState.dispH-cropState.h,startState.y+dy));
    }else{
      let nx=startState.x,ny=startState.y,nw=startState.w,nh=startState.h;
      if(mode.includes('l')){nx=Math.max(0,startState.x+dx);nw=startState.w-(nx-startState.x);}
      if(mode.includes('r')){nw=Math.max(40,Math.min(cropState.dispW-startState.x,startState.w+dx));}
      if(mode.includes('t')){ny=Math.max(0,startState.y+dy);nh=startState.h-(ny-startState.y);}
      if(mode.includes('b')){nh=Math.max(40,Math.min(cropState.dispH-startState.y,startState.h+dy));}
      if(nw>=40)cropState.x=nx,cropState.w=nw;
      if(nh>=40)cropState.y=ny,cropState.h=nh;
    }
    drawCropBox(wrap);
  };
  const onUp=()=>{
    mode=null;
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('mouseup',onUp);
    document.removeEventListener('touchend',onUp);
  };
  box.addEventListener('mousedown',e=>{if(e.target.classList.contains('crop-handle'))return;onDown(e,'move');});
  box.addEventListener('touchstart',e=>{if(e.target.classList.contains('crop-handle'))return;onDown(e,'move');},{passive:false});
  box.querySelectorAll('.crop-handle').forEach(h=>{
    const p=h.classList.contains('tl')?'tl':h.classList.contains('tr')?'tr':h.classList.contains('bl')?'bl':'br';
    h.addEventListener('mousedown',e=>onDown(e,p));
    h.addEventListener('touchstart',e=>onDown(e,p),{passive:false});
  });
}

function fmtRecTime(ms){
  const s=Math.floor(ms/1000);
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}

async function startRecording(mode){
  if(recState)return;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia||!window.MediaRecorder){
    toast(isRu?'Браузер не поддерживает запись':'Recording not supported');return;
  }
  recMode=mode;
  recCancelled=false;recLocked=false;recChunks=[];
  try{
    const audioOpts={echoCancellation:true,noiseSuppression:true,autoGainControl:true};
    const constraints=mode==='circle'?{audio:audioOpts,video:{facingMode:'user',width:320,height:320}}:{audio:audioOpts};
    recStream=await navigator.mediaDevices.getUserMedia(constraints);
  }catch(e){
    const denied=e&&(e.name==='NotAllowedError'||e.name==='SecurityError');
    if(denied){
      toast(mode==='circle'?T.recCamDenied:T.recDenied);
    }else{
      toast(isRu?'Не удалось начать запись':'Recording failed');
    }
    return;
  }
  let mime='';
  const audioCands=['audio/webm;codecs=opus','audio/webm','audio/mp4;codecs=mp4a.40.2','audio/mp4','audio/ogg;codecs=opus','audio/aac',''];
  const videoCands=['video/webm;codecs=vp8,opus','video/webm','video/mp4;codecs=h264,aac','video/mp4',''];
  const cands=mode==='circle'?videoCands:audioCands;
  for(const t of cands){if(t===''||MediaRecorder.isTypeSupported(t)){mime=t;break;}}
  try{
    const opts=mime?{mimeType:mime,audioBitsPerSecond:128000,videoBitsPerSecond:1500000}:{audioBitsPerSecond:128000,videoBitsPerSecond:1500000};
    recMR=new MediaRecorder(recStream,opts);
  }catch(e){
    try{recMR=new MediaRecorder(recStream);}catch(e2){toast('Recording not supported');recStream.getTracks().forEach(t=>t.stop());return;}
  }
  recMR.ondataavailable=e=>{if(e.data&&e.data.size>0)recChunks.push(e.data);};
  recMR.onstop=onRecStop;

  recState=mode;recStartTs=Date.now();
  document.getElementById('rec-overlay').classList.add('show');
  document.getElementById('rec-icon').textContent=mode==='circle'?'⏺':'🎤';
  document.getElementById('rec-hint').textContent=T.recHint;
  document.getElementById('rec-lock').classList.remove('locked');
  document.getElementById('rec-timer').textContent='0:00';

  if(mode==='circle'){
    const ic=document.getElementById('rec-icon');ic.innerHTML='';
    const vv=document.createElement('video');vv.srcObject=recStream;vv.muted=true;vv.autoplay=true;vv.playsInline=true;
    vv.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';
    ic.appendChild(vv);
  }

  recMR.start(250);
  const maxMs=mode==='circle'?60000:600000;
  recTimer=setInterval(()=>{
    const el=Date.now()-recStartTs;
    document.getElementById('rec-timer').textContent=fmtRecTime(el);
    if(el>=maxMs){toast(mode==='circle'?T.recCircleMax:T.recVoiceMax);finishRecording();}
  },200);
}

function lockRecording(){
  if(!recState||recLocked)return;
  recLocked=true;
  document.getElementById('rec-lock').classList.add('locked');
  document.getElementById('rec-hint').textContent=T.recHintLocked;
}

function cancelRecording(){
  if(!recState)return;
  recCancelled=true;
  try{recMR.stop();}catch(_){}
}

function finishRecording(){
  if(!recState)return;
  try{recMR.stop();}catch(_){}
}

function onRecStop(){
  clearInterval(recTimer);recTimer=null;
  document.getElementById('rec-overlay').classList.remove('show');
  if(recStream){recStream.getTracks().forEach(t=>t.stop());recStream=null;}
  const mode=recState;recState=null;recLocked=false;
  if(recCancelled){recChunks=[];return;}
  if(!recChunks.length)return;
  const blob=new Blob(recChunks,{type:recMR.mimeType||(mode==='circle'?'video/webm':'audio/webm')});
  recChunks=[];
  const r=new FileReader();
  r.onload=ev=>{
    const dataUrl=ev.target.result;
    const dur=Math.floor((Date.now()-recStartTs)/1000);
    sendRecordedMessage(mode,dataUrl,dur);
  };
  r.readAsDataURL(blob);
}

  }
  renderMsgs();renderChats(document.getElementById('chat-srch').value);
}

function bindRecGesture(){
  const btn=document.getElementById('voice-btn');
  if(!btn)return;
  let holdTimer=null,pressed=false,recordStarted=false,downAt=0;
  const HOLD_MS=500;
  const onDown=(e)=>{
    if(e.cancelable)e.preventDefault();
    pressed=true;recordStarted=false;downAt=Date.now();
    btn.classList.add('voice-btn-holding');
    holdTimer=setTimeout(()=>{
      if(pressed&&!recState){
        recordStarted=true;
        if('vibrate' in navigator)try{navigator.vibrate(50);}catch(_){}
        startRecording(recMode);
      }
    },HOLD_MS);
  };
  const onUp=(e)=>{
    btn.classList.remove('voice-btn-holding');
    if(!pressed){return;}
    pressed=false;
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
    if(recState){
      if(recLocked)return;
      finishRecording();
    }else if(!recordStarted){
      toggleRecMode();
    }
  };
  const onCancel=()=>{
    btn.classList.remove('voice-btn-holding');
    pressed=false;
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
  };
  btn.addEventListener('touchstart',onDown,{passive:false});
  btn.addEventListener('touchend',onUp);
  btn.addEventListener('touchcancel',onCancel);
  btn.addEventListener('mousedown',onDown);
  btn.addEventListener('mouseup',onUp);
  btn.addEventListener('mouseleave',onCancel);
}

function renderVoiceBubble(msg){
  const wrap=document.createElement('div');wrap.className='voice-msg';

  play.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';
  const info=document.createElement('div');info.className='voice-info';
  const wave=document.createElement('div');wave.className='voice-wave';
  const bars=24;const heights=[];
  let seed=msg.ts;
  for(let i=0;i<bars;i++){seed=(seed*9301+49297)%233280;heights.push(6+(seed/233280)*16);}
  heights.forEach(h=>{const b=document.createElement('span');b.style.height=h+'px';wave.appendChild(b);});
  const time=document.createElement('div');time.className='voice-time';
  time.textContent=Math.floor(msg.voice.duration/60)+':'+String(msg.voice.duration%60).padStart(2,'0');
  info.appendChild(wave);info.appendChild(time);
  wrap.appendChild(play);wrap.appendChild(info);
  const audio=new Audio(msg.voice.data);let playing=false;
  play.onclick=(e)=>{
    e.stopPropagation();
    if(playing){audio.pause();playing=false;play.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';return;}
    playing=true;
    play.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>';
    audio.play();
    audio.ontimeupdate=()=>{
      const pct=audio.currentTime/audio.duration;
      const filled=Math.floor(pct*bars);
      wave.querySelectorAll('span').forEach((b,i)=>b.classList.toggle('played',i<filled));
    };
    audio.onended=()=>{playing=false;play.innerHTML='<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>';wave.querySelectorAll('span').forEach(b=>b.classList.remove('played'));};
  };
  return wrap;
}

function doReply(){
  if(activeMsgIdx===null)return;
  const msgs=gM(),key=activeChat===FAV?favKey():ckey(me.username,activeChat);
  const m=msgs[key][activeMsgIdx];
  const u=gU()[m.from]||{display:m.from};
  replyTo={msgId:m.ts,fromName:u.display||m.from,text:m.text||'[media]'};
  document.getElementById('reply-name').textContent=replyTo.fromName;
  document.getElementById('reply-text').textContent=replyTo.text.slice(0,80);
  document.getElementById('reply-bar').classList.add('show');
  closeMsgMenu();setTimeout(()=>document.getElementById('itxt').focus(),100);
}
function cancelReply(){replyTo=null;document.getElementById('reply-bar').classList.remove('show');}
function doEdit(){
  if(activeMsgIdx===null)return;
  const msgs=gM(),key=activeChat===FAV?favKey():ckey(me.username,activeChat);
  const m=msgs[key][activeMsgIdx];
  if(m.from!==me.username&&activeChat!==FAV)return;
  editingMsg={msgIdx:activeMsgIdx,key};
  const inp=document.getElementById('itxt');inp.value=m.text||'';grow(inp);inp.focus();
  document.getElementById('reply-name').textContent=T.mmEdit;
  document.getElementById('reply-text').textContent=(m.text||'').slice(0,80);
  document.getElementById('reply-bar').classList.add('show');
  closeMsgMenu();
}
function doCopy(){
  if(activeMsgIdx===null)return;
  const msgs=gM(),key=activeChat===FAV?favKey():ckey(me.username,activeChat);
  const m=msgs[key][activeMsgIdx];
  if(navigator.clipboard&&m.text)navigator.clipboard.writeText(m.text).then(()=>toast(T.mmCopied));
  closeMsgMenu();
}
function doDeleteMsg(){
  if(activeMsgIdx===null)return;
  const msgs=gM(),key=activeChat===FAV?favKey():ckey(me.username,activeChat);
  const m=msgs[key][activeMsgIdx];const ts=m.ts;
  const idxToRemove=activeMsgIdx;
  const rows=document.querySelectorAll('#msgs .mrow');
  const row=rows[idxToRemove];
  closeMsgMenu();
  if(row){
    const h=row.offsetHeight;
    row.classList.add('removing');
    setTimeout(()=>{
      row.style.marginTop=(-h-4)+'px';
    },300);
    setTimeout(()=>{
      msgs[key].splice(idxToRemove,1);sM(msgs);
      if(USE_SERVER&&wsReady)try{ws.send(JSON.stringify({type:'delMsg',key,ts}));}catch(_){}
      renderMsgs();renderChats();
    },550);
  }else{
    msgs[key].splice(idxToRemove,1);sM(msgs);
    if(USE_SERVER&&wsReady)try{ws.send(JSON.stringify({type:'delMsg',key,ts}));}catch(_){}
    renderMsgs();renderChats();
  }
}

function openChatMenu(uname,row){
  activeChatMenuUser=uname;
  document.getElementById('mm-overlay').classList.add('show');
  const menu=document.getElementById('chat-menu');menu.style.display='block';
  const pins=getPins();
  document.getElementById('ca-pin').textContent=pins.includes(uname)?T.caUnpin:T.caPin;
  menu.querySelectorAll('.mm-item')[2].style.display=uname===FAV?'none':'flex';
  menu.style.visibility='hidden';
  const r=row.getBoundingClientRect(),vw=window.innerWidth,vh=window.innerHeight;
  requestAnimationFrame(()=>{
    const mW=menu.offsetWidth,mH=menu.offsetHeight;
    let l=Math.min(r.left+20,vw-mW-10);let t=r.bottom+5;
    if(t+mH>vh-20)t=r.top-mH-5;
    menu.style.left=Math.max(10,l)+'px';menu.style.top=Math.max(60,t)+'px';menu.style.visibility='visible';
  });
  document.getElementById('mm-overlay').onclick=closeChatMenu;
}
function closeChatMenu(){
  document.getElementById('mm-overlay').classList.remove('show');
  document.getElementById('mm-overlay').onclick=closeMsgMenu;
  document.getElementById('chat-menu').style.display='none';
  activeChatMenuUser=null;
}
function doPinChat(){
  if(!activeChatMenuUser)return;
  const pins=getPins(),idx=pins.indexOf(activeChatMenuUser);
  if(idx>=0)pins.splice(idx,1);else pins.unshift(activeChatMenuUser);
  setPins(pins);closeChatMenu();renderChats();
}
function doClearHistory(){
  if(!activeChatMenuUser)return;
  const target=activeChatMenuUser;closeChatMenu();
  showModal(T.confirmClearTitle,T.confirmClearText,T.mmDelete,()=>{
    const msgs=gM(),key=target===FAV?favKey():ckey(me.username,target);
    msgs[key]=[];sM(msgs);
    if(activeChat===target)renderMsgs();renderChats();
  });
}
function doDeleteChat(){
  if(!activeChatMenuUser)return;
  if(activeChatMenuUser===FAV){closeChatMenu();return;}
  const target=activeChatMenuUser;closeChatMenu();
  const msgs=gM(),key=ckey(me.username,target);
  delete msgs[key];sM(msgs);
  const pins=getPins().filter(p=>p!==target);setPins(pins);
  if(activeChat===target){activeChat=null;closeChat();}
  renderChats();
}
