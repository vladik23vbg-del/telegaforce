let curEmojiCat=0;
function buildEmojiPicker(){
  const cats=document.getElementById('emoji-cats');cats.innerHTML='';
  EMOJI_CATS.forEach((c,i)=>{
    const b=document.createElement('button');b.className='emoji-cat'+(i===curEmojiCat?' on':'');
    b.textContent=c.ico;
    b.onclick=()=>{
      curEmojiCat=i;
      const sec=document.getElementById('emoji-sec-'+i);
      if(sec)sec.scrollIntoView({behavior:'smooth',block:'start'});
      document.querySelectorAll('.emoji-cat').forEach((el,j)=>el.classList.toggle('on',j===i));
    };
    cats.appendChild(b);
  });
  const grid=document.getElementById('emoji-grid');grid.innerHTML='';
  EMOJI_CATS.forEach((c,i)=>{
    const sec=document.createElement('div');sec.className='emoji-section';sec.id='emoji-sec-'+i;
    const h=document.createElement('div');h.className='emoji-section-h';h.textContent=getCatName(c.name);
    sec.appendChild(h);
    const g=document.createElement('div');g.className='emoji-section-g';
    c.list.forEach(e=>{
      const b=document.createElement('button');b.className='emoji-btn';b.textContent=e;
      b.onclick=()=>{insertEmoji(e);};
      g.appendChild(b);
    });
    sec.appendChild(g);
    grid.appendChild(sec);
  });
  grid.onscroll=()=>{
    const scrollTop=grid.scrollTop;
    let activeIdx=0;
    EMOJI_CATS.forEach((c,i)=>{
      const sec=document.getElementById('emoji-sec-'+i);
      if(sec&&sec.offsetTop-grid.offsetTop<=scrollTop+10)activeIdx=i;
    });
    if(activeIdx!==curEmojiCat){
      curEmojiCat=activeIdx;
      document.querySelectorAll('.emoji-cat').forEach((el,j)=>el.classList.toggle('on',j===activeIdx));
    }
  };
}
function getCatName(name){
  const names={smileys:isRu?'Смайлики':'Smileys',hearts:isRu?'Сердечки':'Hearts',gestures:isRu?'Жесты':'Gestures',animals:isRu?'Животные':'Animals',food:isRu?'Еда':'Food',sports:isRu?'Спорт':'Sports',travel:isRu?'Путешествия':'Travel',objects:isRu?'Объекты':'Objects',symbols:isRu?'Символы':'Symbols',flags:isRu?'Флаги':'Flags'};
  return names[name]||name;
}
function insertEmoji(e){
  const inp=document.getElementById('itxt');
  const s=inp.selectionStart||inp.value.length;
  inp.value=inp.value.slice(0,s)+e+inp.value.slice(s);
  inp.focus();inp.setSelectionRange(s+e.length,s+e.length);grow(inp);
}
function toggleEmojiPicker(ev){
  ev.stopPropagation();
  const pop=document.getElementById('emoji-pop');
  if(pop.style.display==='flex'){
    pop.classList.remove('opening');pop.classList.add('closing');
    setTimeout(()=>{pop.style.display='none';pop.classList.remove('closing');},240);
    return;
  }
  buildEmojiPicker();
  pop.style.display='flex';
  pop.classList.remove('closing');
  const btn=ev.currentTarget,r=btn.getBoundingClientRect();
  const vw=window.innerWidth;
  let left=Math.max(10,Math.min(r.left,vw-pop.offsetWidth-10));
  pop.style.left=left+'px';pop.style.bottom=(window.innerHeight-r.top+8)+'px';pop.style.top='auto';
  pop.style.transformOrigin=(r.left-left+18)+'px 100%';
  requestAnimationFrame(()=>{pop.classList.add('opening');});
}
document.addEventListener('pointerdown',e=>{
  const pop=document.getElementById('emoji-pop');
  if(pop.style.display!=='flex')return;
  if(pop.contains(e.target))return;
  if(e.target.closest('.ibtn'))return;
  pop.classList.remove('opening');pop.classList.add('closing');
  setTimeout(()=>{pop.style.display='none';pop.classList.remove('closing');},240);
});

(async()=>{
  await openIDB();
  await restoreFromIDB();
  const sess=getStore(KEYS.session);
  if(sess&&sess.username){
    const users=gU();
    if(users[sess.username]&&users[sess.username].password===sess.password){
      launch(sess.username,sess.password);
      return;
    }
    if(USE_SERVER){
      try{
        const r=await fetch(SERVER_URL+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:sess.username,password:sess.password})});
        const d=await r.json();
        if(r.ok){
          users[sess.username]={...d.user,password:sess.password};sU(users);
          launch(sess.username,sess.password);
          return;
        }
      }catch(_){}
    }
  }
})();
