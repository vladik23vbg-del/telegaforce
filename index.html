    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>Telegaforce</title>
    <!-- стили и мета-теги такие же, как в твоём исходном HTML -->

<body>
<!-- HTML-разметка скопирована из твоего исходного файла -->
<!-- ... (весь body) ... -->

<script>
'use strict';

// Настройки
const SERVER_URL = 'wss://твой-сервер.onrender.com'; // ← сюда вставишь адрес после деплоя сервера

// ======= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =======
const UK = 'p8u', MK = 'p8m', SK = 'p8s';
const gU = () => JSON.parse(localStorage.getItem(UK) || '{}');
const sU = u => localStorage.setItem(UK, JSON.stringify(u));
const gM = () => JSON.parse(localStorage.getItem(MK) || '{}');
const sM = m => localStorage.setItem(MK, JSON.stringify(m));

let me = null, activeChat = null, ws = null, curTab = 'chats', foundUser = null;
const FAV = '__fav__';
const ckey = (a, b) => [a, b].sort().join('::');

// ... остальные функции (cola, setAv и т.д.) без изменений ...

// ======= WEBSOCKET ПОДКЛЮЧЕНИЕ =======
function connectWebSocket(username) {
    ws = new WebSocket(SERVER_URL);
    ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'login', username: username }));
        // Обновим контакты (запросим список активных пользователей)
        ws.send(JSON.stringify({ type: 'get_users' }));
    };
    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'message') {
            // Добавляем сообщение в историю
            const msgs = gM();
            const key = msg.to === FAV ? FAV : ckey(me.username, msg.from);
            if (!msgs[key]) msgs[key] = [];
            msgs[key].push({
                from: msg.from,
                to: msg.to,
                text: msg.text,
                ts: msg.timestamp,
                read: false,
                media: msg.media || null
            });
            sM(msgs);
            // Обновляем интерфейс
            if (curTab === 'chats') renderChats(document.getElementById('chat-srch').value);
            if (activeChat === msg.from || activeChat === msg.to) renderMsgs();
            updateUnreadDot();
            // Звук входящего сообщения
            sfx('receive');
        } else if (msg.type === 'status') {
            // обновить онлайн-статусы
            const users = gU();
            msg.online.forEach(uname => {
                if (users[uname]) users[uname].online = true;
            });
            sU(users);
            if (curTab === 'contacts') renderContacts();
        } else if (msg.type === 'user_list') {
            // просто сохраним пока ничего не делаем
        }
    };
    ws.onclose = () => {
        // Переподключение через 3 секунды
        setTimeout(() => connectWebSocket(username), 3000);
    };
}

function wsSend(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(data));
    }
}

// ======= ОТПРАВКА СООБЩЕНИЯ (заменяет BroadcastChannel) =======
function send() {
    const inp = document.getElementById('itxt'), text = inp.value.trim();
    if ((!text && pendingAttachments.length === 0) || !activeChat) return;
    if (text.length > 2000) { toast(isRu ? 'Максимум 2000 символов' : 'Max 2000 characters'); return; }
    const isFav = activeChat === FAV;
    // Сохраняем в локальной истории
    const msgs = gM();
    const key = isFav ? FAV : ckey(me.username, activeChat);
    if (!msgs[key]) msgs[key] = [];
    // Формируем сообщения (можно несколько для медиа)
    const messagesToSend = [];
    if (pendingAttachments.length > 0) {
        pendingAttachments.forEach(att => messagesToSend.push({ text: '', media: att }));
        if (text) messagesToSend[messagesToSend.length - 1].text = text;
    } else {
        messagesToSend.push({ text });
    }
    for (const item of messagesToSend) {
        const newMsg = {
            from: me.username,
            to: isFav ? me.username : activeChat,
            text: item.text,
            ts: Date.now(),
            read: isFav ? true : false,
            media: item.media || null
        };
        msgs[key].push(newMsg);
        // Отправляем через WebSocket
        if (!isFav) {
            wsSend({
                type: 'message',
                to: activeChat,
                text: item.text,
                media: item.media
            });
        }
    }
    sM(msgs);
    sfx('send');
    inp.value = ''; inp.style.height = 'auto';
    cancelReply(); cancelAttach();
    renderMsgs();
    if (curTab === 'chats') renderChats(document.getElementById('chat-srch').value);
}

// ... остальные функции без изменений, только вместо bc.postMessage используем wsSend ...

// В функции launch(username) вызываем connectWebSocket(username)
function launch(username) {
    const users = gU(); me = users[username];
    applyTheme();
    // ... анимация ...
    document.getElementById('s-auth').classList.add('gone');
    document.getElementById('s-app').classList.remove('gone');
    document.getElementById('s-app').classList.add('visible');
    document.getElementById('topbar-title').textContent = T.chats;
    document.getElementById('lbl-all-users').textContent = T.allUsers;
    connectWebSocket(me.username);
    buildMyProfile(); buildSettings(); buildEmojiPanel();
    setTab('chats', true);
    setTimeout(positionPill, 100);
    setInterval(tick, 1500);
    window.addEventListener('resize', positionPill);
}

// ======= ЗАМЕНЯЕМ ВСЕ bc.postMessage (поиск и замена) =======
// Везде, где было bc.postMessage({t:'msg',...}), пишем wsSend({type:'message', to: activeChat, text: text})
// Где было bc.postMessage({t:'refresh'}) – wsSend({type:'refresh'})
// Где было bc.postMessage({t:'profile'}) – wsSend({type:'profile'}) и т.д.
// Для простоты я дам готовый файл в следующем сообщении целиком (этот ответ уже огромный)

</script>
</body>
</html>
